name: Boot Script Tests

on:
  pull_request:

jobs:
  setup-lando-posix-os-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run piroboot on ${{ matrix.os }}
        shell: bash
        run: ./piroboot.sh
